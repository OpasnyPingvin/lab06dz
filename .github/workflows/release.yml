name: Create Release Packages

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-deb:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Get version
        id: ver
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
      - name: Build and package
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DVERSION=${{ steps.ver.outputs.VERSION }}
          cmake --build build --target solver
          cd build && cpack -G DEB
          cp *.deb ../solver-${{ steps.ver.outputs.VERSION }}-Linux.deb
      - name: Upload DEB
        uses: actions/upload-artifact@v4
        with:
          name: deb-package
          path: solver-*.deb

  build-rpm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Get version
        id: ver
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
      - name: Install rpm
        run: sudo apt-get install -y rpm
      - name: Build and package
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DVERSION=${{ steps.ver.outputs.VERSION }}
          cmake --build build --target solver
          cd build && cpack -G RPM
          cp *.rpm ../solver-${{ steps.ver.outputs.VERSION }}-Linux.rpm
      - name: Upload RPM
        uses: actions/upload-artifact@v4
        with:
          name: rpm-package
          path: solver-*.rpm

  build-msi:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install WiX Toolset
        run: choco install wixtoolset -y
      - name: Get version
        id: ver
        shell: bash
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
      - name: Build and package
        shell: bash
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DVERSION=${{ steps.ver.outputs.VERSION }}
          cmake --build build --config Release --target solver
          cd build
          cpack -G WIX
          cp *.msi ../solver-${{ steps.ver.outputs.VERSION }}-Windows.msi
      - name: Upload MSI
        uses: actions/upload-artifact@v4
        with:
          name: msi-package
          path: solver-*.msi

  build-dmg:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Get version
        id: ver
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
      - name: Build and package
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DVERSION=${{ steps.ver.outputs.VERSION }}
          cmake --build build --target solver
          cd build && cpack -G DragNDrop
          cp *.dmg ../solver-${{ steps.ver.outputs.VERSION }}-macOS.dmg
      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: dmg-package
          path: solver-*.dmg

  create-release:
    runs-on: ubuntu-latest
    needs: [build-deb, build-rpm, build-msi, build-dmg]
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Get version
        id: ver
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Prepare assets
        run: |
          mkdir assets
          find artifacts -type f -name "*.deb" -exec cp {} assets/ \;
          find artifacts -type f -name "*.rpm" -exec cp {} assets/ \;
          find artifacts -type f -name "*.msi" -exec cp {} assets/ \;
          find artifacts -type f -name "*.dmg" -exec cp {} assets/ \;

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: "Solver v${{ steps.ver.outputs.VERSION }}"
          body: |
            ## Релиз Solver версии ${{ steps.ver.outputs.VERSION }}
            Автоматическая сборка пакетов.
          files: assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
