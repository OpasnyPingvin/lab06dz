name: Create Release Packages

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-package:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            generator: DEB
            ext: deb
            suffix: Linux
          - os: ubuntu-latest
            generator: RPM
            ext: rpm
            suffix: Linux
          - os: windows-latest
            generator: WIX
            ext: msi
            suffix: Windows
          - os: macos-latest
            generator: DragNDrop
            ext: dmg
            suffix: macOS

    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: ver
        shell: bash
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Install dependencies (RPM)
        if: matrix.generator == 'RPM'
        run: sudo apt-get install -y rpm

      - name: Install dependencies (WIX)
        if: matrix.generator == 'WIX'
        run: choco install wixtoolset -y

      - name: Build and package
        shell: bash
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DVERSION=${{ steps.ver.outputs.VERSION }}
          cmake --build build --config Release --target solver
          cd build && cpack -G ${{ matrix.generator }}
          cp *.${{ matrix.ext }} ../solver-${{ steps.ver.outputs.VERSION }}-${{ matrix.suffix }}.${{ matrix.ext }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: package-${{ matrix.generator }}
          path: solver-*.${{ matrix.ext }}

  create-release:
    runs-on: ubuntu-latest
    needs: build-and-package
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Get version
        id: ver
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Prepare assets
        run: |
          mkdir assets
          find artifacts -type f \( -name "*.deb" -o -name "*.rpm" -o -name "*.msi" -o -name "*.dmg" \) -exec cp {} assets/ \;

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: "Solver v${{ steps.ver.outputs.VERSION }}"
          body: |
            ## Релиз Solver версии ${{ steps.ver.outputs.VERSION }}
            Автоматическая сборка пакетов.
          files: assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
